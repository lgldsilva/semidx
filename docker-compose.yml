services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: semantic-indexer-pg
    environment:
      POSTGRES_USER: semantic
      POSTGRES_PASSWORD: semantic
      POSTGRES_DB: semantic_indexer
    ports:
      - "55432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U semantic -d semantic_indexer"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgvector_data:
