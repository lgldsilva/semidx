# SonarCloud configuration for semidx. Consumed by .github/workflows/sonar.yml.
# The server URL and token are passed via env / CLI — no secret lives in this file.
sonar.organization=lgldsilva
sonar.projectKey=lgldsilva_semidx
sonar.projectName=semidx

sonar.sources=.
sonar.tests=.
sonar.test.inclusions=**/*_test.go

# Keep non-code and non-analyzable trees out of the scan (mirrors jackui): the
# vendored/generated/doc trees, the agentics test harness (deploy/) and the JAR
# test fixtures. Otherwise they add new_violations noise the gate counts.
# web/ is validated in CI via `npm ci`, `tsc`, and `vite build`; Sonar TS rules
# (spacing, void-use without node_modules types) are noisy and duplicate ESLint.
sonar.exclusions=**/.slim/**,**/.crush/**,**/vendor/**,**/dist/**,**/web/**,**/testdata/**,deploy/**,docs/**,internal/skills/**,internal/store/migrations/**,**/*.md

# Coverage produced by `go test -coverprofile=coverage.out ./...`.
sonar.go.coverage.reportPaths=coverage.out

# Out of the coverage denominator so the new_coverage gate reflects library code:
#  - cmd/**:    thin CLI (cobra) wiring, exercised end-to-end.
#  - deploy/**: the agentics test harness + MCP probe (a test tool itself).
#  - internal/indexstoretest/**: shared IndexStore contract runner (invoked from tests).
#  - internal/webadmin/templates/**, internal/webchat/templates/**: HTML shells (UI via SPA/E2E).
#  - internal/webui/**: embedded React build artifacts (validated via npm build in CI).
#  - internal/mcpinstall/**: agent MCP client config registry + apply (`semidx mcp install`).
#  - internal/skills/**: embedded agent skill packs + install (`semidx skills install`).
#  - internal/store/migrations/**, migrations.go: goose SQL DDL + runner (Postgres integration only).
sonar.coverage.exclusions=cmd/**,deploy/**,internal/webadmin/templates/**,internal/webchat/templates/**,internal/webui/**,internal/indexstoretest/**,internal/mcpinstall/**,internal/skills/**,internal/store/migrations/**,internal/store/migrations.go

# Block the pipeline on the server-side quality gate result.
sonar.qualitygate.wait=true

# The scanner runs in CI without full SCM metadata; skip blame collection.
sonar.scm.disabled=true

# Documented rule exceptions (team standard: a smell exception needs a reason).
# S3776 (cognitive complexity) does not apply to test files: table-driven cases,
# adversarial/property suites and fixtures branch far more than production code.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=go:S3776
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*_test.go
