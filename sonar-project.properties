# SonarQube configuration for semidx. Consumed by the `sonar` job in
# .gitea/workflows/release.yml (npx sonarqube-scanner). The server URL and token
# are passed on the command line / via env so no secret lives in this file.
sonar.projectKey=semidx
sonar.projectName=semidx

# Analyse the whole module; classify *_test.go as tests, everything else as
# source. Go's convention keeps tests next to the code, so sources and tests
# share the same root and are separated by the test inclusion pattern.
sonar.sources=.
sonar.tests=.
sonar.test.inclusions=**/*_test.go

# Coverage produced by `go test -coverprofile=coverage.out ./...`.
sonar.go.coverage.reportPaths=coverage.out

# cmd/ is thin CLI wiring exercised end-to-end, not unit-covered; exclude it
# from the coverage denominator so the quality gate reflects library code.
sonar.coverage.exclusions=cmd/**

# Block the pipeline on the server-side quality gate result.
sonar.qualitygate.wait=true

# The scanner runs in CI without full SCM metadata; skip blame collection.
sonar.scm.disabled=true
