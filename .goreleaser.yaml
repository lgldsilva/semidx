# GoReleaser — cross-platform release artifacts for semidx.
#
# Builds the CLI for linux/macOS/Windows on amd64+arm64, packages each as
# tar.gz (zip on Windows) with README + LICENSE, emits SHA-256 checksums and a
# grouped changelog, and publishes a GitHub release. Run by the `goreleaser`
# job in .github/workflows/release.yml on a `v*` tag.
#
# Validate locally without publishing:  goreleaser check  &&  goreleaser release --snapshot --clean
version: 2

project_name: semidx

before:
  hooks:
    - go mod download

builds:
  - id: semidx
    main: ./cmd/semidx
    binary: semidx
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.date={{ .Date }}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

  - id: chatrag
    main: ./cmd/chatrag
    binary: chatrag
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: semidx
    formats: [tar.gz]
    # Windows users expect a zip.
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"

changelog:
  sort: asc
  use: git
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - '^Merge '

# GitHub release (public). install.sh/ps1 fetch from here.
release:
  github:
    owner: lgldsilva
    name: semidx
  draft: false
  prerelease: auto

# Package manager taps (lgldsilva/homebrew-tap, lgldsilva/scoop-bucket)
# enabled using the TAP_GITHUB_TOKEN repository secret.
# Track: https://github.com/lgldsilva/semidx/issues/16
brews:
  - name: semidx
    # Skip when TAP_GITHUB_TOKEN is absent (secret not yet configured).
    skip_upload: '{{ if .Env.TAP_GITHUB_TOKEN }}false{{ else }}true{{ end }}'
    repository:
      owner: lgldsilva
      name: homebrew-tap
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/lgldsilva/semidx
    description: "Self-hosted semantic code search."
    license: Apache-2.0
    install: |
      bin.install "semidx"
      bin.install "chatrag"
    commit_msg_template: "Brew formula update for {{ .ProjectName }} {{ .Tag }}"

scoops:
  - name: semidx
    # Skip when TAP_GITHUB_TOKEN is absent (secret not yet configured).
    skip_upload: '{{ if .Env.TAP_GITHUB_TOKEN }}false{{ else }}true{{ end }}'
    repository:
      owner: lgldsilva
      name: scoop-bucket
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/lgldsilva/semidx
    description: "Self-hosted semantic code search."
    license: Apache-2.0
    commit_msg_template: "Scoop update for {{ .ProjectName }} {{ .Tag }}"
