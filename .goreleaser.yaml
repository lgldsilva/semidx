# GoReleaser — cross-platform release artifacts for semidx.
#
# Builds the CLI for linux/macOS/Windows on amd64+arm64, packages each as
# tar.gz (zip on Windows) with README + LICENSE, emits SHA-256 checksums and a
# grouped changelog, and publishes a Gitea release. Run by the `release-artifacts`
# job in .gitea/workflows/release.yml on a `v*` tag.
#
# Validate locally without publishing:  goreleaser check  &&  goreleaser release --snapshot --clean
version: 2

project_name: semidx

before:
  hooks:
    - go mod download

builds:
  - id: semidx
    main: ./cmd/semidx
    binary: semidx
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.date={{ .Date }}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

  - id: chatrag
    main: ./cmd/chatrag
    binary: chatrag
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: semidx
    formats: [tar.gz]
    # Windows users expect a zip.
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"

changelog:
  sort: asc
  use: git
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - '^Merge '

# Gitea release (self-hosted homelab). The download host is used by install.sh.
gitea_urls:
  api: https://gitea.raspberrypi.lan/api/v1
  download: https://gitea.raspberrypi.lan

release:
  gitea:
    owner: lgldsilva
    name: semidx
  draft: false
  prerelease: auto
