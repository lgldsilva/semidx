{{define "title"}}Chat — {{.Project}}{{end}}
{{define "body"}}
<div id="chat" data-project="{{.Project}}" style="display:flex;flex-direction:column;flex:1;min-height:0;">
    <div class="project-header">
        <h1>{{.Project}}</h1>
        <div class="subtitle">Ask questions about your codebase</div>
    </div>

    <div class="chat-body">
        <aside id="sidebar">
            <button type="button" id="new-chat-btn">+ New chat</button>
            <ul id="conv-list"></ul>
        </aside>

        <div id="chat-main">
            <div id="messages"></div>

            <div id="loading">
                <div class="spinner"></div>
                <div style="margin-top:0.4rem;">Thinking...</div>
            </div>

            <div id="error"></div>

            <form id="chat-form">
                <label for="question" style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0">Ask about your codebase</label>
                <input type="text" id="question" name="question" placeholder="Ask about your codebase..." autofocus autocomplete="off" aria-label="Ask about your codebase">
                <button type="submit" id="send-btn">Send</button>
                <button type="button" id="clear-btn">Clear</button>
            </form>

            <div id="model-info"></div>
        </div>
    </div>
</div>

<script>
(function() {
    var form = document.getElementById('chat-form');
    var input = document.getElementById('question');
    var messages = document.getElementById('messages');
    var errorEl = document.getElementById('error');
    var loadingEl = document.getElementById('loading');
    var modelInfo = document.getElementById('model-info');
    var project = document.getElementById('chat').dataset.project;
    var sidebar = document.getElementById('sidebar');
    var convList = document.getElementById('conv-list');
    var history = [];
    var convId = null;       // active persisted conversation (null = unsaved)
    var convsEnabled = false; // set when GET /api/conversations succeeds

    function apiJSON(url, opts) {
        return fetch(url, opts).then(function(resp) {
            if (!resp.ok) { throw new Error('HTTP ' + resp.status); }
            return resp.json();
        });
    }

    function clearChat() {
        messages.innerHTML = '';
        modelInfo.textContent = '';
        errorEl.className = '';
        history = [];
        convId = null;
        markActiveConv();
    }

    function markActiveConv() {
        convList.querySelectorAll('.conv-item').forEach(function(item) {
            item.classList.toggle('active', Number(item.dataset.id) === convId);
        });
    }

    function deleteConversation(id) {
        fetch('/api/conversations/' + id, {method: 'DELETE'})
            .then(function() {
                if (convId === id) { clearChat(); }
                return refreshConversations();
            })
            .catch(function(err) { console.debug('delete conversation failed', err); });
    }

    function renderConvList(convs) {
        convList.innerHTML = '';
        convs.forEach(function(c) {
            var li = document.createElement('li');
            li.className = 'conv-item';
            li.dataset.id = c.id;

            var title = document.createElement('span');
            title.className = 'conv-title';
            title.textContent = c.title || 'Untitled';
            title.title = c.title || 'Untitled';
            li.appendChild(title);

            var del = document.createElement('button');
            del.type = 'button';
            del.className = 'conv-delete';
            del.title = 'Delete conversation';
            del.textContent = '×';
            del.addEventListener('click', function(e) {
                e.stopPropagation();
                deleteConversation(c.id);
            });
            li.appendChild(del);

            li.addEventListener('click', function() { loadConversation(c.id); });
            convList.appendChild(li);
        });
        markActiveConv();
    }

    function refreshConversations() {
        return apiJSON('/api/conversations').then(function(data) {
            renderConvList(data.conversations || []);
        });
    }

    function loadConversation(id) {
        apiJSON('/api/conversations/' + id).then(function(data) {
            messages.innerHTML = '';
            modelInfo.textContent = '';
            errorEl.className = '';
            history = [];
            convId = id;
            (data.messages || []).forEach(function(m) {
                addMessage(m.role, m.content);
                history.push({role: m.role, content: m.content});
            });
            markActiveConv();
        }).catch(function(err) {
            showError('Could not load conversation: ' + err.message);
        });
    }

    function postTurnMessage(id, role, content) {
        return apiJSON('/api/conversations/' + id + '/messages', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({role: role, content: content})
        });
    }

    // persistTurn saves a completed user/assistant exchange, creating the
    // conversation on the first turn. Failures only log: persistence must
    // never break the chat itself.
    function persistTurn(question, answer) {
        if (!convsEnabled) return;
        var ready = convId === null
            ? apiJSON('/api/conversations', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({project: project, title: question.slice(0, 60)})
            }).then(function(c) { convId = c.id; return c.id; })
            : Promise.resolve(convId);
        ready.then(function(id) {
            return postTurnMessage(id, 'user', question).then(function() {
                return postTurnMessage(id, 'assistant', answer);
            });
        })
        .then(refreshConversations)
        .catch(function(err) { console.debug('conversation persist failed', err); });
    }

    // Show the sidebar only when the backend persists conversations (the
    // endpoint answers 501 otherwise).
    fetch('/api/conversations').then(function(resp) {
        if (!resp.ok) return;
        return resp.json().then(function(data) {
            convsEnabled = true;
            sidebar.classList.add('visible');
            renderConvList(data.conversations || []);
        });
    }).catch(function() { /* sidebar stays hidden */ });

    document.getElementById('new-chat-btn').addEventListener('click', clearChat);

    function addMessage(role, content) {
        var div = document.createElement('div');
        div.className = 'message ' + role;
        div.textContent = content;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }

    function showSources(sources) {
        if (!sources || sources.length === 0) return;

        var msgs = messages.querySelectorAll('.message.assistant');
        var lastMsg = msgs[msgs.length - 1];
        if (!lastMsg) return;

        var toggle = document.createElement('button');
        toggle.className = 'sources-toggle';
        var plural = sources.length > 1 ? 's' : '';
        toggle.textContent = '📎 ' + sources.length + ' source' + plural;
        var sourceLabel = sources.length + ' source' + plural;
        var hideLabel = '📎 hide sources';
        toggle.addEventListener('click', function() {
            var list = this.nextElementSibling;
            if (list) {
                list.classList.toggle('open');
                if (list.classList.contains('open')) {
                    this.textContent = hideLabel;
                } else {
                    this.textContent = '📎 ' + sourceLabel;
                }
            }
        });
        lastMsg.parentNode.insertBefore(toggle, lastMsg.nextSibling);

        var list = document.createElement('ul');
        list.className = 'sources-list';

        sources.forEach(function(s) {
            var li = document.createElement('li');
            li.className = 'source-item';

            if (!s.keyword && s.score > 0) {
                var score = document.createElement('span');
                score.className = 'score';
                score.textContent = s.score.toFixed(3);
                li.appendChild(score);
            }
            if (s.keyword) {
                var badge = document.createElement('span');
                badge.className = 'keyword-badge';
                badge.textContent = '[keyword]';
                li.appendChild(badge);
            }

            var path = document.createElement('span');
            path.className = 'file-path';
            path.textContent = s.file + ':' + s.start_line + '-' + s.end_line;
            li.appendChild(path);

            var content = document.createElement('pre');
            content.className = 'source-content';
            content.textContent = s.content;
            li.appendChild(content);

            list.appendChild(li);
        });

        toggle.parentNode.insertBefore(list, toggle.nextSibling);
    }

    function showError(msg) {
        errorEl.textContent = msg;
        errorEl.className = 'visible';
        setTimeout(function() {
            errorEl.className = '';
        }, 8000);
    }

    function showLoading(on) {
        loadingEl.className = on ? 'visible' : '';
        if (on) {
            var spinner = loadingEl.querySelector('.spinner');
            if (spinner) spinner.style.display = 'inline-block';
        }
    }

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        var q = input.value.trim();
        if (!q) return;

        addMessage('user', q);
        input.value = '';
        input.disabled = true;
        showLoading(true);
        errorEl.className = '';
        modelInfo.textContent = '';

        // Try streaming first, fall back to non-streaming.
        streamChat(q).catch(function() {
            return nonStreamingChat(q);
        })
        .catch(function(err) {
            showError('Network error: ' + err.message);
        })
        .finally(function() {
            input.disabled = false;
            showLoading(false);
            input.focus();
        });
    });

    function streamChat(question) {
        return fetch('/api/chat/stream', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({question: question, project: project, history: history})
        })
        .then(function(resp) {
            if (!resp.ok) {
                return resp.json().then(function(data) {
                    throw new Error(data.error || 'Stream failed: ' + resp.status);
                });
            }

            var reader = resp.body.getReader();
            var decoder = new TextDecoder();
            var buffer = '';
            var assistantDiv = null;
            var content = '';
            var model = '';

            // Create an assistant message bubble immediately.
            assistantDiv = document.createElement('div');
            assistantDiv.className = 'message assistant';
            messages.appendChild(assistantDiv);
            messages.scrollTop = messages.scrollHeight;

            function processLine(line) {
                if (!line || line.indexOf('data: ') !== 0) return;
                var jsonStr = line.substring(6);

                var data = null;
                try {
                    data = JSON.parse(jsonStr);
                } catch (parseErr) {
                    console.debug('skip malformed SSE line', parseErr);
                    return;
                }
                if (!data) {
                    return;
                }

                if (data.type === 'chunk') {
                    content += data.content;
                    assistantDiv.textContent = content;
                    messages.scrollTop = messages.scrollHeight;
                } else if (data.type === 'done') {
                    model = data.model || '';
                } else if (data.type === 'sources') {
                    if (data.sources && data.sources.length > 0) {
                        showSources(data.sources);
                    }
                    var info = 'Model: ' + (model || data.model || 'unknown');
                    if (data.fallback) {
                        info += ' (keyword fallback)';
                    }
                    modelInfo.textContent = info;
                } else if (data.type === 'error') {
                    showError(data.error);
                }
            }

            function processPart(part) {
                part.split('\n').forEach(processLine);
            }

            function processBufferParts() {
                var parts = buffer.split('\n\n');
                buffer = parts.pop() || '';
                parts.forEach(processPart);
            }

            function finishStream() {
                var remaining = buffer.trim();
                if (remaining) {
                    remaining.split('\n').forEach(processLine);
                }
                if (content) {
                    history.push({role: 'user', content: question}, {role: 'assistant', content: content});
                    persistTurn(question, content);
                }
            }

            function onReadResult(result) {
                if (result.done) {
                    finishStream();
                    return;
                }
                buffer += decoder.decode(result.value, {stream: true});
                processBufferParts();
                return pump();
            }

            function pump() {
                return reader.read().then(onReadResult);
            }

            return pump();
        });
    }

    function nonStreamingChat(question) {
        return fetch('/api/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({question: question, project: project, history: history})
        })
        .then(function(resp) { return resp.json(); })
        .then(function(data) {
            if (data.error) {
                throw new Error(data.error);
            }
            history.push({role: 'user', content: question}, {role: 'assistant', content: data.content});
            persistTurn(question, data.content);
            addMessage('assistant', data.content);
            if (data.sources && data.sources.length > 0) {
                showSources(data.sources);
            }
            var info = 'Model: ' + (data.model || 'unknown');
            if (data.fallback) info += ' (keyword fallback)';
            modelInfo.textContent = info;
        });
    }

    document.getElementById('clear-btn').addEventListener('click', clearChat);
})();
</script>
{{end}}
