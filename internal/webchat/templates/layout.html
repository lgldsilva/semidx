{{define "layout"}}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatRAG — {{block "title" .}}Semantic Chat{{end}}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font: 16px/1.6 system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container {
            max-width: 960px;
            width: 100%;
            margin: 0 auto;
            padding: 1rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Project header */
        .project-header {
            text-align: center;
            padding: 1rem 0 0.5rem;
            border-bottom: 1px solid #2a2a4a;
            margin-bottom: 1rem;
        }
        .project-header h1 {
            font-size: 1.25rem;
            color: #e0e0e0;
            font-weight: 600;
        }
        .project-header .subtitle {
            font-size: 0.82rem;
            color: #6b7280;
            margin-top: 0.15rem;
        }

        /* Messages area */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem 0;
            min-height: 300px;
            max-height: calc(100vh - 260px);
        }
        .message {
            margin-bottom: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            max-width: 85%;
            line-height: 1.55;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .message.user {
            background: #0f3460;
            align-self: flex-end;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        .message.assistant {
            background: #16213e;
            align-self: flex-start;
            margin-right: auto;
            border-bottom-left-radius: 4px;
        }
        .message.system {
            background: transparent;
            align-self: center;
            font-size: 0.85rem;
            color: #6b7280;
            text-align: center;
            max-width: 100%;
        }

        /* Sources */
        .sources-toggle {
            font-size: 0.78rem;
            color: #818cf8;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0.2rem 0;
            margin-left: 1rem;
            margin-top: -0.3rem;
            display: block;
        }
        .sources-toggle:hover {
            text-decoration: underline;
        }
        .sources-list {
            display: none;
            margin: 0.35rem 0 0.5rem 1rem;
            padding: 0;
            list-style: none;
        }
        .sources-list.open {
            display: block;
        }
        .source-item {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.75rem;
            color: #9ca3af;
            padding: 0.15rem 0;
        }
        .source-item .score {
            color: #34d399;
            margin-right: 0.4rem;
        }
        .source-item .keyword-badge {
            color: #f59e0b;
            font-size: 0.7rem;
            margin-left: 0.3rem;
        }
        .source-item .file-path {
            color: #9ca3af;
        }
        .source-item .source-content {
            margin-top: 0.25rem;
            padding: 0.3rem 0.4rem;
            background: #111827;
            border-radius: 4px;
            font-size: 0.72rem;
            line-height: 1.4;
            max-height: 120px;
            overflow-y: auto;
            color: #9ca3af;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* Loading spinner */
        #loading {
            display: none;
            text-align: center;
            padding: 1rem;
            color: #6b7280;
        }
        #loading.visible {
            display: block;
        }
        .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid #2a2a4a;
            border-top: 3px solid #818cf8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Error display */
        #error {
            display: none;
            background: #7f1d1d;
            color: #fca5a5;
            padding: 0.65rem 1rem;
            border-radius: 8px;
            margin-bottom: 0.75rem;
            font-size: 0.9rem;
            animation: fadeIn 0.2s ease;
        }
        #error.visible {
            display: block;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Input area */
        #chat-form {
            display: flex;
            gap: 0.5rem;
            padding: 0.75rem 0;
            border-top: 1px solid #2a2a4a;
            margin-top: 0.5rem;
        }
        #question {
            flex: 1;
            padding: 0.65rem 0.9rem;
            border: 1px solid #374151;
            border-radius: 8px;
            background: #111827;
            color: #e0e0e0;
            font: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.15s ease;
        }
        #question:focus {
            border-color: #818cf8;
        }
        #question::placeholder {
            color: #6b7280;
        }
        #chat-form button {
            padding: 0.65rem 1.2rem;
            border: 0;
            border-radius: 8px;
            font: inherit;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s ease;
        }
        #send-btn {
            background: #4f46e5;
            color: #fff;
        }
        #send-btn:hover {
            background: #6366f1;
        }
        #send-btn:disabled {
            background: #374151;
            color: #d1d5db;
            cursor: not-allowed;
        }
        #clear-btn {
            background: transparent;
            color: #6b7280;
            border: 1px solid #374151 !important;
        }
        #clear-btn:hover {
            background: #1f2937;
            color: #e0e0e0;
        }

        /* Model info */
        #model-info {
            font-size: 0.75rem;
            color: #6b7280;
            text-align: center;
            padding: 0.25rem 0 0;
            min-height: 1.2rem;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .container { padding: 0.5rem; }
            .message { max-width: 92%; }
            #messages { max-height: calc(100vh - 220px); }
        }
    </style>
</head>
<body>
    <div class="container">{{template "body" .}}</div>
</body>
</html>{{end}}
