{{define "users.html"}}{{template "head" .}}
<h1>Users</h1>
{{template "flashes" .}}

<div class="card">
  <h2 style="margin-top:0">Create user</h2>
  <form method="post" action="/admin/users">
    <input type="hidden" name="csrf_token" value="{{.CSRF}}">
    <div class="row">
      <label class="grow">Username<input type="text" name="username" required></label>
      <label class="grow">Password<input type="password" name="password" minlength="8" required></label>
      <label>Role
        <select name="role">
          <option value="member" selected>member</option>
          <option value="admin">admin</option>
        </select>
      </label>
      <button type="submit">Create</button>
    </div>
  </form>
</div>

<h2>All users</h2>
<table>
  <thead><tr><th>Username</th><th>Role</th><th>Status</th><th></th></tr></thead>
  <tbody>
  {{range .Data}}
    <tr>
      <td>{{.Username}}</td>
      <td>{{.Role}}</td>
      <td>{{if .Disabled}}<span class="pill" style="background:#fee;color:#b91c1c">disabled</span>{{else}}<span class="pill" style="background:#efe;color:#166534">active</span>{{end}}</td>
      <td>
        {{if ne .ID $.User.ID}}
        <form method="post" action="/admin/users/disable" class="inline">
          <input type="hidden" name="csrf_token" value="{{$.CSRF}}">
          <input type="hidden" name="id" value="{{.ID}}">
          <input type="hidden" name="disabled" value="{{if .Disabled}}false{{else}}true{{end}}">
          <button class="link" type="submit">{{if .Disabled}}Enable{{else}}Disable{{end}}</button>
        </form>
        {{else}}<span class="muted">you</span>{{end}}
      </td>
    </tr>
  {{end}}
  </tbody>
</table>
{{template "foot" .}}{{end}}
