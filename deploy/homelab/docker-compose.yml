# semidx — homelab instance (raspberrypi-srv). PULL-BASED deploy.
#
# Unlike deploy/docker-compose.yml (which BUILDS from source for external
# self-hosting), this pulls the released image from the Gitea registry and lets
# Watchtower — already running on the host — redeploy it when a new :latest is
# pushed by the release pipeline. Watchtower only swaps the image; env/port/
# volume changes still need an edit here + `docker compose up -d`.
#
# One-time host setup (see docs/CICD.md → Deploy):
#   1) docker login gitea.raspberrypi.lan            # so Watchtower can pull
#   2) cp .env.example .env  &&  fill the secrets
#   3) docker compose up -d
# Then cutting a `v*` tag ships a new image and Watchtower redeploys it.
name: semidx

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-semidx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-semidx}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-semidx} -d ${POSTGRES_DB:-semidx}"]
      interval: 10s
      timeout: 5s
      retries: 20
    # No published port — pgvector is internal-only; the sole ingress is the
    # semidx API/UI port below.

  semidx:
    image: ${SEMIDX_IMAGE:-gitea.raspberrypi.lan/lgldsilva/semidx:latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SEMIDX_DB_DSN: postgres://${POSTGRES_USER:-semidx}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-semidx}?sslmode=disable
      # The host has a GPU + Ollama; reach it via host.docker.internal by default.
      SEMIDX_OLLAMA_URL: ${SEMIDX_OLLAMA_URL:-http://host.docker.internal:11434}
      SEMIDX_LISTEN_ADDR: ":8080"
      SEMIDX_INDEX_WORKERS: ${SEMIDX_INDEX_WORKERS:-1}
      SEMIDX_DATA_DIR: /var/lib/semidx
      # First-boot bootstrap (used only while the DB is empty): an admin API token
      # for the CLI and the admin web password. Leave the token empty to have one
      # generated and printed in the logs once.
      SEMIDX_BOOTSTRAP_TOKEN: ${SEMIDX_BOOTSTRAP_TOKEN:-}
      SEMIDX_BOOTSTRAP_ADMIN_USER: ${SEMIDX_BOOTSTRAP_ADMIN_USER:-admin}
      SEMIDX_BOOTSTRAP_ADMIN_PASSWORD: ${SEMIDX_BOOTSTRAP_ADMIN_PASSWORD:-}
      SEMIDX_JWT_SECRET: ${SEMIDX_JWT_SECRET:-}
      # Master key for the AES-256-GCM git-credential vault (see .env.example).
      SEMIDX_SECRET_KEY: ${SEMIDX_SECRET_KEY:-}
      SEMIDX_COOKIE_SECURE: ${SEMIDX_COOKIE_SECURE:-true}
      # Homelab Gitea typically uses a self-signed cert; without this, server-side
      # git clone/reindex fails with "TLS certificate not trusted".
      SEMIDX_GIT_SSL_NO_VERIFY: ${SEMIDX_GIT_SSL_NO_VERIFY:-true}
      SEMIDX_GIT_TOKEN: ${SEMIDX_GIT_TOKEN:-}
      SEMIDX_GITHUB_TOKEN: ${SEMIDX_GITHUB_TOKEN:-}
      GOMEMLIMIT: ${GOMEMLIMIT:-900MiB}
      # Optional cloud embedding providers (the chain falls back to local Ollama).
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    volumes:
      - semidx_data:/var/lib/semidx
    ports:
      - "${SEMIDX_PORT:-8080}:8080" # the ONLY published port — API + /admin UI
    extra_hosts:
      - "host.docker.internal:host-gateway" # reach the host's Ollama
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

volumes:
  db_data:
  semidx_data:
