name: semidx

# semidx — pull-based deploy. Pulls the pre-built image from the Gitea container
# registry instead of building locally. Use this when you don't want to compile
# the Go binary yourself, or when deploying on a machine without the Go toolchain.
#
# The :main tag is pushed automatically on every merge to main (CI pipeline), so
# you get the latest without waiting for a version tag. Set SEMIDX_IMAGE to pin a
# specific version (e.g. gitea.raspberrypi.lan/lgldsilva/semidx:v0.3.0).
#
# If you do NOT have access to the Gitea registry, use docker-compose.yml which
# builds from source.
#
# Bring it up:
#   docker compose -f deploy/docker-compose.pull.yml up -d
#
# See deploy/docker-compose.yml for the build-from-source equivalent.
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: semidx
      POSTGRES_PASSWORD: ${SEMIDX_DB_PASSWORD:-changeme}
      POSTGRES_DB: semidx
    # No `ports:` — the database is internal-only.
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U semidx -d semidx"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  semidx:
    image: ${SEMIDX_IMAGE:-gitea.raspberrypi.lan/lgldsilva/semidx:main}
    depends_on:
      db:
        condition: service_healthy
    environment:
      SEMIDX_DB_DSN: postgres://semidx:${SEMIDX_DB_PASSWORD:-changeme}@db:5432/semidx?sslmode=disable
      SEMIDX_LISTEN_ADDR: ":8080"
      SEMIDX_DATA_DIR: /data
      # Optional: fix the first admin token instead of a generated one.
      SEMIDX_BOOTSTRAP_TOKEN: ${SEMIDX_BOOTSTRAP_TOKEN:-}
      SEMIDX_BOOTSTRAP_ADMIN_USER: ${SEMIDX_BOOTSTRAP_ADMIN_USER:-admin}
      SEMIDX_BOOTSTRAP_ADMIN_PASSWORD: ${SEMIDX_BOOTSTRAP_ADMIN_PASSWORD:-}
      SEMIDX_JWT_SECRET: ${SEMIDX_JWT_SECRET:-}
      # Embedding providers (set what you use). Ollama example:
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # Soft heap cap so the runtime GCs before the container limit.
      GOMEMLIMIT: ${GOMEMLIMIT:-900MiB}
    # Make the OLLAMA_URL host.docker.internal default resolve on Linux hosts
    # (Docker Desktop provides it automatically; plain Linux does not).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${SEMIDX_HTTP_PORT:-8080}:8080" # only the API is exposed
    volumes:
      - semidx_data:/data
    restart: unless-stopped

volumes:
  db_data:
  semidx_data:
