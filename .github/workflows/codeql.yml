name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

# Skip on Gitea Actions: github/codeql-action is a GitHub-specific action
# that clones github.com/codeql-action and uploads results to GitHub's
# Code Scanning API. Gitea runners have no GitHub credentials and Gitea
# has no equivalent Code Scanning backend, so the job would always fail.
# On GitHub, this workflow works once "Code scanning" is enabled in
# repo Settings (free for public repos).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (go)
    # NOTE: this workflow is GitHub-only (uses github/codeql-action which
    # requires GitHub credentials + the Code Scanning API). A job-level
    # if-guard using env.X is NOT supported by GitHub Actions (parse
    # error: 'Unrecognized named-value: env'). Removing the guard means
    # the workflow will run on Gitea and fail at the first step — Gitea
    # releases are out of scope for CodeQL; the Gitea mirror only needs
    # the ci.yml gates to be green. Re-introduce the guard via a
    # Gitea-specific workflow file in .gitea/workflows/ if Gitea code
    # scanning is ever needed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: go
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:go"
