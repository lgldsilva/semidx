# SonarCloud quality gate (public repo — free on SonarCloud).
# Requires secrets: SONAR_TOKEN
# Optional vars:   SONAR_ORGANIZATION (defaults to lgldsilva)
name: sonar

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

env:
  GOTOOLCHAIN: go1.26.5

jobs:
  sonar:
    name: sonarcloud
    runs-on: ubuntu-latest
    steps:
      - name: Check SONAR_TOKEN
        id: check
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "SONAR_TOKEN not set — skipping SonarCloud (configure secret to enable)."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.check.outputs.configured == 'true'
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        if: steps.check.outputs.configured == 'true'
        with:
          go-version: "1.26.5"
          cache: false
      - name: Test with coverage
        if: steps.check.outputs.configured == 'true'
        run: go test -race -shuffle=on -count=1 -coverprofile=coverage.out ./...
      - name: SonarCloud Scan
        if: steps.check.outputs.configured == 'true'
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          # Organization/projectKey also live in sonar-project.properties;
          # these -D flags let CI override without editing the file.
          args: >
            -Dsonar.organization=lgldsilva
            -Dsonar.projectKey=lgldsilva_semidx
            -Dsonar.go.coverage.reportPaths=coverage.out
