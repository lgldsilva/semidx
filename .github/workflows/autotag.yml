# Semantic versioning from Conventional Commits (svu).
# Pushes a new v* tag on main when commits warrant a bump.
name: autotag

# Autotag on every main push flooded tags/releases during the GitHub
# migration (v0.41–v0.44 spam + failed goreleaser runs). Keep the workflow
# for intentional bumps via Actions → Run workflow; cut release tags by hand
# (or re-enable push after the cutover settles).
on:
  workflow_dispatch:

permissions:
  contents: write

env:
  GOTOOLCHAIN: go1.26.5

jobs:
  autotag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26.5"
          cache: false
      - name: Compute next tag with svu
        id: svu
        run: |
          set -euo pipefail
          current=$(go run github.com/caarlos0/svu/v3@v3.2.3 current 2>/dev/null || echo "v0.0.0")
          next=$(go run github.com/caarlos0/svu/v3@v3.2.3 next)
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "next=$next" >> "$GITHUB_OUTPUT"
          echo "current=$current next=$next"
      - name: Push tag if new
        if: steps.svu.outputs.current != steps.svu.outputs.next
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.svu.outputs.next }}"
          git push origin "${{ steps.svu.outputs.next }}"
