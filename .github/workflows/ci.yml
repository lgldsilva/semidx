# CI gates for public GitHub. No homelab secrets.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  GOTOOLCHAIN: go1.26.5

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: false
      - name: Build
        run: go build ./...
      - name: Test (race + shuffle + coverage)
        run: |
          go test -race -shuffle=on -count=1 -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | tee coverage.txt
      - name: Coverage gate (≥90% overall)
        run: |
          set -euo pipefail
          total=$(go tool cover -func=coverage.out | awk '/^total:/{print $3}' | tr -d '%')
          echo "total coverage: ${total}%"
          awk -v t="$total" 'BEGIN { if (t+0 < 90) { print "coverage below 90%: " t; exit 1 } }'

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: false
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "gofmt needed on:"
            echo "$unformatted"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2 run ./...

  secretscan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: false
      - name: gitleaks
        run: go run github.com/zricethezav/gitleaks/v8@v8.30.1 detect --source . -v --no-banner

  vulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: false
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  gosec:
    name: gosec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: false
      - name: gosec
        run: go run github.com/securego/gosec/v2/cmd/gosec@v2.27.1 -quiet ./...

  trivy:
    name: trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        # Pinned to commit SHA (same as tag v0.28.0) — tag-only refs like
        # aquasecurity/trivy-action@0.28.0 fail with "unable to find version
        # 0.28.0" because the repo uses action.yaml (not action.yml) and
        # resolution needs the `v` prefix or a SHA. Pin to a SHA for
        # immutability.
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2 # v0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
