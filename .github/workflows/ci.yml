name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Portable across Gitea Actions (current host) and GitHub Actions (F7 migration):
# only actions/checkout and actions/setup-go are used; lint and secret-scan run
# as plain `go run` steps so no GitHub-specific marketplace action is required.
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go build ./...
      # The store integration tests skip automatically when no Docker provider
      # is reachable from the runner (testcontainers SkipIfProviderIsNotHealthy).
      - run: go test -race -shuffle=on ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2 run --timeout 5m ./...

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go run github.com/zricethezav/gitleaks/v8@latest detect --source . --no-banner --redact --exit-code 1

  # Supply-chain gate: fail on known CVEs in dependencies or the Go stdlib that
  # actually reach our code paths. Portable (plain `go run`), no infra needed.
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  # SAST gate: static security analysis. Pinned (a floating @latest could require
  # a newer Go toolchain than go.mod, which the runner's GOTOOLCHAIN=local blocks).
  # Documented exceptions carry inline `#nosec RULE -- reason` justifications.
  gosec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go run github.com/securego/gosec/v2/cmd/gosec@v2.27.1 -quiet ./...
