name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Portable across Gitea Actions (current host) and GitHub Actions (F7 migration):
# only actions/checkout and actions/setup-go are used; lint and secret-scan run
# as plain `go run` steps so no GitHub-specific marketplace action is required.
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go build ./...
      # The store integration tests skip automatically when no Docker provider
      # is reachable from the runner (testcontainers SkipIfProviderIsNotHealthy).
      - run: go test -race -shuffle=on ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2 run --timeout 5m ./...

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go run github.com/zricethezav/gitleaks/v8@latest detect --source . --no-banner --redact --exit-code 1

  # Supply-chain gate: fail on known CVEs in dependencies or the Go stdlib that
  # actually reach our code paths. Portable (plain `go run`), no infra needed.
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  # SAST gate: static security analysis. Pinned (a floating @latest could require
  # a newer Go toolchain than go.mod, which the runner's GOTOOLCHAIN=local blocks).
  # Documented exceptions carry inline `#nosec RULE -- reason` justifications.
  gosec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go run github.com/securego/gosec/v2/cmd/gosec@v2.27.1 -quiet ./...

  # SonarQube quality gate — MAIN ONLY. The homelab Sonar is Community edition,
  # which analyses a single branch (no PR/branch analysis), so this runs only on
  # push to main: a post-merge gate that tracks main's health. What predicts
  # mergeability on a PR is the rest of this file (build, test, lint, gitleaks,
  # govulncheck, gosec, image-scan). Skips without SONAR_TOKEN so forks stay green.
  sonar:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: https://sonar.raspberrypi.lan
      # Homelab Sonar uses the internal CA; the Node scanner must accept it.
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
    steps:
      - uses: actions/checkout@v4
        if: ${{ env.SONAR_TOKEN != '' }}
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        if: ${{ env.SONAR_TOKEN != '' }}
        with:
          go-version-file: go.mod
      - name: Coverage
        if: ${{ env.SONAR_TOKEN != '' }}
        run: go test -coverprofile=coverage.out ./...
      - name: SonarQube analysis + gate (main)
        if: ${{ env.SONAR_TOKEN != '' }}
        env:
          # act_runner usually has no DNS for *.raspberrypi.lan; pin the homelab
          # IP (override with the SONAR_HOST_IP repo variable if the server moves).
          SONAR_HOST_IP: ${{ vars.SONAR_HOST_IP }}
        run: |
          set -eu
          HOSTS_IP="${SONAR_HOST_IP:-192.168.0.100}"
          if ! getent hosts sonar.raspberrypi.lan >/dev/null 2>&1; then
            echo "$HOSTS_IP sonar.raspberrypi.lan" | sudo tee -a /etc/hosts >/dev/null 2>&1 \
              || echo "$HOSTS_IP sonar.raspberrypi.lan" >> /etc/hosts || true
          fi
          # All analysis config (projectKey, coverage, exclusions,
          # sonar.qualitygate.wait) is in sonar-project.properties.
          npx -y sonarqube-scanner \
            -Dsonar.host.url="$SONAR_HOST_URL" \
            -Dsonar.token="$SONAR_TOKEN"
      - name: Sonar skipped
        if: ${{ env.SONAR_TOKEN == '' }}
        run: echo "SONAR_TOKEN not set — skipping SonarQube analysis."

  # Image security gate: build the container and fail on a fixable CRITICAL CVE.
  # This is the GATE (build + scan, never push) — publishing the image is the
  # release pipeline's job (release.yml). Skips if the runner has no Docker.
  image-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Docker is available
        id: docker
        run: |
          if docker info >/dev/null 2>&1; then echo "ok=true" >> "$GITHUB_OUTPUT"; else
            echo "ok=false" >> "$GITHUB_OUTPUT"; echo "No Docker on the runner — skipping the image scan."; fi
      - name: Build image
        if: ${{ steps.docker.outputs.ok == 'true' }}
        run: docker build -t semidx:ci .
      - name: Trivy scan (local image, fail on fixable CRITICAL)
        if: ${{ steps.docker.outputs.ok == 'true' }}
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --scanners vuln --ignore-unfixed --severity CRITICAL --exit-code 1 \
            semidx:ci
