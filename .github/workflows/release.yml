# Release artifacts to GitHub Releases + GHCR. No Gitea / homelab tokens.
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Least privilege at workflow level; write scopes live on the jobs that need them.
permissions:
  contents: read

env:
  GOTOOLCHAIN: go1.26.5
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  goreleaser:
    name: goreleaser
    # NOTE: this workflow is GitHub-only. It uses actions
    # (docker/login-action, docker/build-push-action,
    # softprops/action-gh-release) and secrets (GITHUB_TOKEN, GHCR)
    # that don't exist on Gitea Actions. On Gitea the workflow will
    # fail at the first step — a job-level if-guard using env.X is
    # not supported by GitHub Actions (parse error). Gitea releases
    # are out of scope for automated CI; use the Gitea Releases API
    # to create them manually if needed.
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      # GitHub Actions runners have ~14 GB of ephemeral disk. Cross-compiling
      # 12 binaries (semidx + chatrag × 6 platform combos) fills the disk
      # and the Go linker aborts with "no space left on device". Free up
      # space before the heavy goreleaser build.
      # IMPORTANT: this MUST run before setup-go — it deletes the
      # pre-installed Go toolchains from /opt/hostedtoolcache/go/.
      # setup-go then installs the exact version we need into the
      # freshly-cleaned cache dir.
      - name: Free disk space before build
        run: |
          set -uo pipefail
          echo "=== disk before ==="
          df -h /tmp /github/workspace 2>/dev/null || true
          # Remove pre-installed language toolchains we don't need
          # (Node, Python, Ruby, Haskell, .NET, PHP, pre-installed Go).
          sudo rm -rf /opt/hostedtoolcache/Node* \
                       /opt/hostedtoolcache/Python* \
                       /opt/hostedtoolcache/Ruby* \
                       /opt/hostedtoolcache/Haskell* \
                       /opt/hostedtoolcache/PyPy* \
                       /opt/hostedtoolcache/dotnet \
                       /opt/hostedtoolcache/php \
                       /opt/hostedtoolcache/go/1.* 2>/dev/null || true
          # Clear /tmp.
          sudo rm -rf /tmp/* 2>/dev/null || true
          echo "=== disk after ==="
          df -h /tmp /github/workspace 2>/dev/null || true
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26.5"
          cache: false
      - name: Login to GHCR
        # Pin third-party actions by full commit SHA (SonarCloud S7637).
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build web admin assets
        run: |
          if [ -f scripts/build-web.sh ]; then
            bash scripts/build-web.sh
          fi
      - name: GoReleaser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: go run github.com/goreleaser/goreleaser/v2@v2.13.0 release --clean
      - name: Build and push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}

  sbom:
    name: sbom
    runs-on: ubuntu-latest
    needs: [goreleaser]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Generate CycloneDX SBOM
        uses: CycloneDX/gh-gomod-generate-sbom@efc74245d6802c8cefd925620515442756c70d8f # v2.0.0
        with:
          version: v1.9.0
          # cyclonedx-gomod v1.9.0: `mod` generates a module-level SBOM
          # (all deps). `app` requires a single main-package path, not
          # a ./... pattern. Module path '.' = current directory.
          args: mod -licenses -json -output bom.json .
      - name: Upload SBOM to release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: bom.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  package-manifests:
    name: package manifests
    runs-on: ubuntu-latest
    needs: [goreleaser]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Download release checksums
        env:
          TAG: ${{ github.ref_name }}
        run: |
          curl --fail --location --retry 3 --silent --show-error \
            --output checksums.txt \
            "https://github.com/${{ github.repository }}/releases/download/${TAG}/checksums.txt"
      - name: Render AUR and Snap manifests
        env:
          TAG: ${{ github.ref_name }}
        run: |
          scripts/render-package-manifests.sh "$TAG" checksums.txt package-manifests
          tar -C package-manifests -czf "semidx-${TAG}-package-manifests.tar.gz" aur snap
          sha256sum "semidx-${TAG}-package-manifests.tar.gz" \
            >"semidx-${TAG}-package-manifests.tar.gz.sha256"
      - name: Upload package manifests to release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: |
            semidx-*-package-manifests.tar.gz
            semidx-*-package-manifests.tar.gz.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
