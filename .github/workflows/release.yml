# Release artifacts to GitHub Releases + GHCR. No Gitea / homelab tokens.
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  GOTOOLCHAIN: go1.26.5
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  goreleaser:
    name: goreleaser
    # NOTE: this workflow is GitHub-only. It uses actions
    # (docker/login-action, docker/build-push-action,
    # softprops/action-gh-release) and secrets (GITHUB_TOKEN, GHCR)
    # that don't exist on Gitea Actions. On Gitea the workflow will
    # fail at the first step — a job-level if-guard using env.X is
    # not supported by GitHub Actions (parse error). Gitea releases
    # are out of scope for automated CI; use the Gitea Releases API
    # to create them manually if needed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: false
      # GitHub Actions runners have ~14 GB of ephemeral disk. Cross-compiling
      # 12 binaries (semidx + chatrag × 6 platform combos) fills the disk
      # and the Go linker aborts with "no space left on device". Free up
      # space before the heavy goreleaser build.
      - name: Free disk space before build
        run: |
          echo "=== disk before ==="
          df -h /tmp /github/workspace
          # Remove pre-installed language toolchains we don't need (Node,
          # Python, Ruby, Haskell, .NET, PHP, Go pre-installed alternatives).
          sudo rm -rf /opt/hostedtoolcache/Node* \
                       /opt/hostedtoolcache/Python* \
                       /opt/hostedtoolcache/Ruby* \
                       /opt/hostedtoolcache/Haskell* \
                       /opt/hostedtoolcache/PyPy* \
                       /opt/hostedtoolcache/dotnet \
                       /opt/hostedtoolcache/php \
                       /opt/hostedtoolcache/go/1.* 2>/dev/null || true
          # Clear any pre-existing Go build cache.
          go clean -cache -modcache 2>/dev/null || true
          # Clear /tmp.
          sudo rm -rf /tmp/* 2>/dev/null || true
          echo "=== disk after ==="
          df -h /tmp /github/workspace
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build web admin assets
        run: |
          if [ -f scripts/build-web.sh ]; then
            bash scripts/build-web.sh
          fi
      - name: GoReleaser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go run github.com/goreleaser/goreleaser/v2@v2.13.0 release --clean
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}

  sbom:
    name: sbom
    runs-on: ubuntu-latest
    needs: [goreleaser]
    steps:
      - uses: actions/checkout@v4
      - name: Generate CycloneDX SBOM
        uses: CycloneDX/gh-gomod-generate-sbom@v2
        with:
          version: v1.9.0
          # cyclonedx-gomod >= v1.10.0 requires a subcommand (app, mod,
          # or bin) before the module path. v0.44.4 release failed because
          # the action passed `./...` as the first positional arg, which
          # cyclonedx-gomod now treats as invalid and prints help instead
          # of generating the SBOM. Use `app ./...` for application-level
          # SBOMs (what's actually linked into the binary). Pin v1.9.0
          # to keep the working CLI shape — v1.10+ would need a different
          # args layout and the action hasn't been updated yet.
          args: app ./... -licenses -json -output bom.json
      - name: Upload SBOM to release
        uses: softprops/action-gh-release@v2
        with:
          files: bom.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
