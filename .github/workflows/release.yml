# Release artifacts to GitHub Releases + GHCR. No Gitea / homelab tokens.
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Least privilege at workflow level; write scopes live on the jobs that need them.
permissions:
  contents: read

env:
  GOTOOLCHAIN: go1.26.5
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  goreleaser:
    name: goreleaser
    # NOTE: this workflow is GitHub-only. It uses actions
    # (docker/login-action, docker/build-push-action,
    # softprops/action-gh-release) and secrets (GITHUB_TOKEN, GHCR)
    # that don't exist on Gitea Actions. On Gitea the workflow will
    # fail at the first step — a job-level if-guard using env.X is
    # not supported by GitHub Actions (parse error). Gitea releases
    # are out of scope for automated CI; use the Gitea Releases API
    # to create them manually if needed.
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: false
      - name: Login to GHCR
        # Pin third-party actions by full commit SHA (SonarCloud S7637).
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build web admin assets
        run: |
          if [ -f scripts/build-web.sh ]; then
            bash scripts/build-web.sh
          fi
      - name: GoReleaser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go run github.com/goreleaser/goreleaser/v2@v2.13.0 release --clean
      - name: Build and push Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}

  sbom:
    name: sbom
    runs-on: ubuntu-latest
    needs: [goreleaser]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate CycloneDX SBOM
        uses: CycloneDX/gh-gomod-generate-sbom@efc74245d6802c8cefd925620515442756c70d8f # v2.0.0
        with:
          version: v1
          args: ./... -licenses -json -output bom.json
      - name: Upload SBOM to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: bom.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
