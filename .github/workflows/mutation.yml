# Nightly mutation testing (gremlins) on the business-logic packages. Mutation is
# too slow for a per-PR gate (it re-runs tests per mutant), so it runs on a
# schedule and can be triggered manually. It fails only if efficacy drops below a
# floor — a regression alarm, not a strict gate (some mutants are equivalent).
name: Mutation (nightly)
on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
permissions:
  contents: read
jobs:
  gremlins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # Excludes packages exercised through integration/handler tests (store needs
      # testcontainers; server/webadmin/mcp are httptest-driven) — mutating those
      # per-mutant would run the slow suites. Pure business logic is mutated here.
      - name: gremlins unleash (business logic)
        run: |
          go run github.com/go-gremlins/gremlins/cmd/gremlins@v0.6.0 unleash \
            --exclude-files 'internal/store/.*' \
            --exclude-files 'internal/server/.*' \
            --exclude-files 'internal/webadmin/.*' \
            --exclude-files 'internal/mcpserver/.*' \
            --exclude-files 'internal/gitsync/.*' \
            --exclude-files 'cmd/.*' \
            --threshold-efficacy 65
