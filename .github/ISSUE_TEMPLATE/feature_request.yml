name: Feature request
description: Suggest an idea for semidx
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests help shape the roadmap. Be concrete about the problem, not just the solution.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you tried or considered.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - Search / embeddings
        - Server / API
        - MCP / agent integration
        - Web admin
        - Docs / packaging
        - Other
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and did not find a duplicate
          required: true
