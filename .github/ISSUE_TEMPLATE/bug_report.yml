name: Bug report
description: Report a bug in semidx
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.
  - type: input
    id: version
    attributes:
      label: semidx version
      description: Output of `semidx version` (or the release tag / commit).
      placeholder: v0.43.1
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: How are you running semidx?
      options:
        - Standalone (SQLite / --local)
        - Server (semidx serve)
        - Docker Compose
        - MCP client only
        - Other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps or commands that trigger the issue.
      placeholder: |
        1. semidx --local index --project .
        2. semidx --local sgrep --project . --query "..."
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Paste relevant stderr/logs (redact secrets).
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and did not find a duplicate
          required: true
        - label: This report does not contain secrets, tokens, or private hostnames
          required: true
